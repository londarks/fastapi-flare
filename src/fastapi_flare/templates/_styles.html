{#- Global CSS — included inside <style> in layout.html.
    Do NOT add <style> tags here.                        -#}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Kinetic Obsidian palette ────────────────────────────────────── */
      --bg:         #030303;                    /* The Void                */
      --bg-card:    #0e0e0e;                    /* container-lowest        */
      --bg-row:     #141313;                    /* surface                 */
      --bg-hover:   #201f1f;                    /* container               */
      --border:     #1c1b1b;                    /* container-low           */
      --border-dim: #353434;                    /* surface-variant         */
      /* Primary accent — Kinetic Flare orange. Variable names kept as
         --red* for historical reasons; they now carry the orange accent. */
      --red:        #ff5f1f;
      --red-light:  #ffb59c;
      --red-glow:   rgba(255, 95, 31, 0.22);
      --red-dim:    rgba(255, 95, 31, 0.09);
      /* Status colours (unchanged — warn / ok semantics) */
      --amber:      #f59e0b;
      --amber-dim:  rgba(245, 158, 11, 0.10);
      --green:      #22c55e;
      --green-dim:  rgba(34, 197, 94, 0.10);
      /* Violet underglow — atmospheric layering */
      --violet:     #5f3780;
      --violet-glow: rgba(95, 55, 128, 0.16);
      /* Text */
      --white:      #e5e2e1;
      --gray:       #7a7775;
      --gray-light: #aa897f;                    /* warm outline            */
      --mono:       'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --sidebar-w:  220px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--red); }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      background: rgba(14, 14, 14, 0.72);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      display: flex; align-items: center; gap: 16px; padding: 0 24px;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; letter-spacing: -.3px; flex-shrink: 0; }
    .logo i { color: var(--red); font-size: 22px; filter: drop-shadow(0 0 8px rgba(255, 95, 31, 0.5)); }
    .logo span { color: var(--white); }
    .logo .badge { font-size: 10px; font-weight: 700; background: var(--red-dim); border: 1px solid rgba(255,95,31,.35); color: var(--red-light); padding: 2px 7px; border-radius: 99px; letter-spacing: .5px; text-transform: uppercase; font-family: var(--mono); }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; top: 56px; left: 0; bottom: 0; width: var(--sidebar-w);
      background: rgba(8, 8, 8, 0.78);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border-right: 1px solid rgba(255,255,255,0.04);
      box-shadow: 12px 0 32px rgba(0,0,0,0.35);
      display: flex; flex-direction: column; z-index: 90;
      padding: 20px 14px;
      transition: transform .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 10px; margin-bottom: 10px; font-family: var(--mono); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 12px;
      font-size: 13px; font-weight: 500;
      text-decoration: none; color: var(--gray-light);
      border: 1px solid transparent;
      transition: all .2s;
    }
    .nav-item i { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; transition: transform .2s; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); border-color: var(--border-dim); }
    .nav-item:hover i { transform: translateX(2px); }
    .nav-item.active {
      color: var(--red);
      background: rgba(255, 95, 31, 0.08);
      border-color: rgba(255,95,31,.22);
      box-shadow: inset -8px 0 18px rgba(255,95,31,0.07);
    }
    .nav-item.active i { filter: drop-shadow(0 0 6px rgba(255,95,31,.55)); }
    .sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .sidebar-footer i { font-size: 11px; color: var(--red); }
    .sidebar-footer span { font-size: 11px; color: var(--gray); letter-spacing: .3px; font-family: var(--mono); }

    /* ── SIDEBAR TOGGLE ── */
    .sidebar-toggle {
      width: 32px; height: 32px; border-radius: 10px;
      border: 1px solid var(--border-dim);
      background: transparent; color: var(--gray-light);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; transition: all .15s;
    }
    .sidebar-toggle:hover { background: var(--bg-hover); border-color: var(--gray); color: var(--white); }
    .sidebar-toggle:active { background: var(--red-dim); border-color: var(--red); color: var(--red-light); }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .refresh-toggle { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--gray-light); cursor: pointer; user-select: none; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .toggle-switch { position: relative; width: 36px; height: 20px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 99px; transition: .2s; cursor: pointer; }
    .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; background: var(--gray); border-radius: 50%; transition: .2s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--red-glow); border: 1px solid var(--red); box-shadow: 0 0 10px rgba(255,95,31,0.3); }
    .toggle-switch input:checked + .toggle-slider::before { background: var(--red); transform: translateX(16px); box-shadow: 0 0 8px rgba(255,95,31,0.7); }

    /* ── MAIN ── */
    main { margin-top: 56px; margin-left: var(--sidebar-w); padding: 28px 32px; transition: margin-left .25s cubic-bezier(.4,0,.2,1); min-height: calc(100vh - 56px); position: relative; }
    /* Ambient underglow — atmospheric layering */
    main::before {
      content: ''; position: fixed; top: 40%; right: -120px;
      width: 300px; height: 300px; border-radius: 50%;
      background: var(--violet-glow); filter: blur(80px);
      pointer-events: none; z-index: -1;
    }
    main::after {
      content: ''; position: fixed; bottom: -80px; left: calc(var(--sidebar-w) - 40px);
      width: 280px; height: 280px; border-radius: 50%;
      background: rgba(255,95,31,0.04); filter: blur(100px);
      pointer-events: none; z-index: -1;
    }
    body.sidebar-collapsed main { margin-left: 0; }
    body.sidebar-collapsed main::after { left: -40px; }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: linear-gradient(180deg, rgba(20,19,19,0.9) 0%, rgba(14,14,14,0.85) 100%);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 2px 12px rgba(0,0,0,0.25);
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at top right, var(--violet-glow), transparent 60%);
      opacity: 0; transition: opacity .4s;
    }
    .stat-card:hover { border-color: rgba(255,95,31,0.18); transform: translateY(-1px); }
    .stat-card:hover::after { opacity: 1; }
    .stat-card.red   { border-left: 3px solid var(--red); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 2px 12px rgba(0,0,0,0.25), -3px 0 24px rgba(255,95,31,0.12); }
    .stat-card.amber { border-left: 3px solid var(--amber); }
    .stat-card.green { border-left: 3px solid var(--green); }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1.2px; font-family: var(--mono); }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--white); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1.1; }
    .stat-value.red   { color: var(--red); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-sub { font-size: 11px; color: var(--gray); font-family: var(--mono); letter-spacing: 0.02em; }

    /* ── FILTERS ── */
    .filters {
      background: rgba(14,14,14,0.85);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 16px 22px;
      margin-bottom: 18px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 10px; color: var(--gray); font-weight: 700; white-space: nowrap; text-transform: uppercase; letter-spacing: 1.2px; font-family: var(--mono); }
    input[type=text], select { background: rgba(20,19,19,0.8); border: 1px solid var(--border-dim); border-radius: 10px; color: var(--white); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color .2s, box-shadow .2s; }
    input[type=text]:focus, select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,95,31,0.12); }
    input[type=text]::placeholder { color: var(--gray); }
    select option { background: var(--bg-row); }
    .search-input { width: 260px; }
    .btn { border: none; border-radius: 99px; padding: 8px 18px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.8px; font-family: var(--mono); }
    .btn-red   {
      background: linear-gradient(135deg, #ff7a3c 0%, var(--red) 100%);
      color: #1a0a00;
      box-shadow: 0 4px 16px rgba(255,95,31,0.28);
    }
    .btn-red:hover { box-shadow: 0 6px 24px rgba(255,95,31,0.42); transform: translateY(-1px); }
    .btn-red:active { transform: translateY(0); }
    .btn-ghost { background: rgba(255,255,255,0.03); color: var(--white); border: 1px solid var(--border-dim); }
    .btn-ghost:hover { border-color: rgba(255,95,31,0.45); color: var(--red-light); background: rgba(255,95,31,0.05); }
    .filters-right { margin-left: auto; display: flex; gap: 10px; }

    /* ── TABLE ── */
    .table-wrapper {
      background: rgba(14,14,14,0.85);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .table-header { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 13px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 10px; letter-spacing: -0.01em; }
    .table-count { font-size: 11px; color: var(--gray-light); background: rgba(255,255,255,0.03); border: 1px solid var(--border-dim); border-radius: 99px; padding: 3px 12px; font-family: var(--mono); font-weight: 500; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(255,255,255,0.02); }
    th { text-align: left; padding: 11px 16px; font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1.2px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; font-family: var(--mono); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: background .15s; }
    tbody tr:hover { background: rgba(255,95,31,0.035); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.level-error   { border-left: 3px solid var(--red); }
    tbody tr.level-warning { border-left: 3px solid var(--amber); }
    tbody tr.metric-warn   { border-left: 3px solid var(--amber); }
    tbody tr.metric-crit   { border-left: 3px solid var(--red); }
    td { padding: 12px 16px; font-size: 13px; color: var(--gray-light); vertical-align: middle; }
    td.td-time     { white-space: nowrap; font-size: 12px; font-family: var(--mono); color: var(--gray); letter-spacing: 0.02em; }
    td.td-message  { max-width: 380px; }
    td.td-endpoint { white-space: nowrap; font-size: 12px; font-family: var(--mono); }
    td.td-num      { font-family: var(--mono); font-size: 13px; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
    .td-message-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--white); }

    /* ── BADGES ── */
    .badge-level { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; font-family: var(--mono); }
    .badge-level.error   { background: var(--red-dim);   color: var(--red-light); border: 1px solid rgba(255,95,31,.28); }
    .badge-level.warning { background: var(--amber-dim); color: var(--amber);     border: 1px solid rgba(245,158,11,.28); }
    .badge-event { display: inline-block; font-size: 11px; font-family: var(--mono); background: rgba(255,255,255,0.02); border: 1px solid var(--border-dim); color: var(--gray-light); padding: 3px 9px; border-radius: 6px; white-space: nowrap; letter-spacing: 0.02em; }
    .badge-method { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; }
    .badge-method.get    { background: rgba(34,197,94,.12);  color: #4ade80; }
    .badge-method.post   { background: rgba(59,130,246,.12); color: #60a5fa; }
    .badge-method.patch  { background: rgba(234,179,8,.12);  color: #facc15; }
    .badge-method.delete { background: rgba(255,95,31,.12);  color: var(--red-light); }

    /* ── LATENCY ── */
    .lat-ok   { color: var(--green); }
    .lat-warn { color: var(--amber); }
    .lat-crit { color: var(--red-light); }
    .rate-ok   { color: var(--green); }
    .rate-warn { color: var(--amber); }
    .rate-crit { color: var(--red-light); }

    /* ── EMPTY / LOADING ── */
    .empty-state { padding: 60px 20px; text-align: center; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-state i { font-size: 36px; color: var(--border-dim); }
    .empty-state p { font-size: 13px; }
    .loading-row td { text-align: center; padding: 40px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border-dim); border-top-color: var(--red); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── PAGINATION ── */
    .pagination { padding: 14px 22px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: space-between; }
    .pagination-info { font-size: 11px; color: var(--gray); font-family: var(--mono); letter-spacing: 0.02em; }
    .pagination-btns { display: flex; gap: 4px; }
    .pg-btn { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--border-dim); background: rgba(255,255,255,0.02); color: var(--gray-light); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; font-family: var(--mono); }
    .pg-btn:hover:not(:disabled) { border-color: rgba(255,95,31,0.45); color: var(--red-light); }
    .pg-btn.active { background: linear-gradient(135deg, #ff7a3c 0%, var(--red) 100%); border-color: var(--red); color: #1a0a00; font-weight: 700; box-shadow: 0 4px 14px rgba(255,95,31,0.28); }
    .pg-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      width: 100%; max-width: 860px; max-height: 90vh;
      overflow: hidden; display: flex; flex-direction: column;
      transform: translateY(14px); transition: transform .25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 25px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 40px rgba(95,55,128,0.08);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-head { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; gap: 12px; }
    .modal-head .modal-level  { flex-shrink: 0; }
    .modal-head .modal-event  { font-size: 15px; font-weight: 600; color: var(--white); font-family: var(--mono); letter-spacing: -0.01em; }
    .modal-head .modal-time   { margin-left: auto; font-size: 11px; color: var(--gray); font-family: var(--mono); flex-shrink: 0; letter-spacing: 0.02em; }
    .modal-close { flex-shrink: 0; width: 30px; height: 30px; border-radius: 10px; border: 1px solid var(--border-dim); background: rgba(255,255,255,0.02); color: var(--gray); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 13px; }
    .modal-close:hover { border-color: rgba(255,95,31,0.45); color: var(--red-light); }
    .modal-body { overflow-y: auto; padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }

    /* ── DETAIL SECTIONS (modal body) ── */
    .detail-section { display: flex; flex-direction: column; gap: 8px; }
    .detail-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gray); border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 8px; display: flex; align-items: center; gap: 8px; font-family: var(--mono); }
    .detail-section-title i { color: var(--red); }
    .detail-message { font-size: 13px; color: var(--white); line-height: 1.6; }
    .detail-error { font-size: 13px; color: var(--red-light); line-height: 1.5; font-family: var(--mono); background: var(--red-dim); border: 1px solid rgba(255,95,31,.22); border-radius: 12px; padding: 12px 16px; }

    /* ── META GRID ── */
    .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .meta-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 14px; }
    .meta-key { font-size: 9px; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; font-family: var(--mono); }
    .meta-val { font-size: 12px; color: var(--white); font-family: var(--mono); word-break: break-all; letter-spacing: 0.02em; }
    .meta-val.none { color: var(--gray); font-style: italic; }

    /* ── CODE BLOCK ── */
    pre.code-block { background: rgba(3,3,3,0.7); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 1.65; overflow-x: auto; white-space: pre-wrap; word-break: break-word; color: var(--gray-light); max-height: 280px; overflow-y: auto; }
    pre.code-block.stack { color: var(--red-light); }
    .code-block-wrapper { position: relative; }
    .copy-btn { position: absolute; top: 10px; right: 10px; background: rgba(20,19,19,0.9); border: 1px solid var(--border-dim); color: var(--gray); border-radius: 8px; padding: 4px 10px; font-size: 10px; cursor: pointer; transition: all .15s; z-index: 1; display: flex; align-items: center; gap: 5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
    .copy-btn:hover { border-color: rgba(255,95,31,0.45); color: var(--red-light); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── LIVE DOT ── */
    .live-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse-ring 1.8s ease-in-out infinite; flex-shrink: 0; box-shadow: 0 0 10px rgba(255,95,31,0.7); }
    .live-dot.off { background: var(--gray); animation: none; box-shadow: none; }
    @keyframes pulse-ring { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } }

    /* ── SKELETON ROWS ── */
    .skel { height: 12px; border-radius: 6px; display: inline-block; background: linear-gradient(90deg, var(--bg-row) 25%, var(--bg-hover) 50%, var(--bg-row) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── TOAST ── */
    .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: rgba(14,14,14,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,95,31,0.25); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--white); box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 20px rgba(255,95,31,0.12); pointer-events: all; transform: translateY(10px); opacity: 0; transition: transform .25s, opacity .25s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { color: var(--red); }
    .toast.toast-green i { color: var(--green); }

    /* ── CHIPS ── */
    .level-chips { display: flex; gap: 6px; }
    .chip { padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border-dim); font-size: 10px; font-weight: 700; cursor: pointer; transition: all .15s; background: rgba(255,255,255,0.02); color: var(--gray-light); white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); }
    .chip:hover:not(.active) { border-color: rgba(255,95,31,0.35); color: var(--white); }
    .chip.active { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,.2); color: var(--white); }
    .chip.active[data-level="ERROR"]   { background: var(--red-dim);   border-color: rgba(255,95,31,.4);  color: var(--red-light); }
    .chip.active[data-level="WARNING"] { background: var(--amber-dim); border-color: rgba(245,158,11,.4); color: var(--amber); }
    .chip.active[data-resolved="false"] { background: var(--red-dim);  border-color: rgba(255,95,31,.4);  color: var(--red-light); }
    .chip.active[data-resolved="true"]  { background: var(--green-dim); border-color: rgba(34,197,94,.4); color: var(--green); }

    /* ── ACTIVE ROW ── */
    tbody tr.row-active { background: rgba(255,95,31,.06) !important; box-shadow: inset 3px 0 0 var(--red); }

    /* ── STAT FLASH ── */
    @keyframes flash-val { 0%{background:rgba(255,95,31,.25);border-radius:8px} 100%{background:transparent} }
    .stat-flash { animation: flash-val .8s ease-out; }

    /* ── HEALTH BAR ── */
    .header-health { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-dim); border-radius: 99px; padding: 5px 12px; flex-shrink: 0; }
    .hh-item { display: flex; align-items: center; gap: 6px; }
    .hh-val  { font-size: 10px; color: var(--gray-light); font-family: var(--mono); white-space: nowrap; letter-spacing: 0.05em; font-weight: 600; }
    .hh-sep  { width: 1px; height: 12px; background: var(--border-dim); margin: 0 2px; }
    .health-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
    .health-dot.ok      { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.6); }
    .health-dot.warn    { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.6); }
    .health-dot.down    { background: var(--red-light); animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 8px rgba(255,95,31,0.7); }
    .health-dot.unknown { background: var(--gray); }

    /* ── PROFILE PILL ── */
    .profile-pill { position: relative; display: flex; align-items: center; gap: 8px; padding: 5px 12px 5px 6px; border-radius: 99px; border: 1px solid var(--border-dim); background: rgba(255,255,255,0.03); cursor: pointer; user-select: none; transition: all .15s; flex-shrink: 0; }
    .profile-pill:hover { border-color: rgba(255,95,31,0.35); background: rgba(255,95,31,0.04); }
    .profile-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: var(--red-dim); border: 1px solid rgba(255,95,31,.38); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--red-light); overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-name { font-size: 12px; font-weight: 500; color: var(--white); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .profile-chevron { font-size: 10px; color: var(--gray); transition: transform .2s; }
    .profile-pill.open .profile-chevron { transform: rotate(180deg); }
    .profile-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px; background: rgba(14,14,14,0.95); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 8px; z-index: 200; box-shadow: 0 12px 32px rgba(0,0,0,.6); }
    .profile-pill.open .profile-dropdown { display: block; }
    .profile-dd-header { padding: 10px 12px 12px; }
    .profile-dd-name  { font-size: 13px; font-weight: 600; color: var(--white); }
    .profile-dd-email { font-size: 11px; color: var(--gray); margin-top: 2px; word-break: break-all; font-family: var(--mono); }
    .profile-dd-sep   { height: 1px; background: rgba(255,255,255,0.05); margin: 6px 0; }
    .profile-dd-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; font-size: 13px; color: var(--gray-light); text-decoration: none; cursor: pointer; transition: all .12s; border: none; background: none; width: 100%; text-align: left; }
    .profile-dd-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
    .profile-dd-item.danger:hover { background: var(--red-dim); color: var(--red-light); }
    .profile-dd-item i { font-size: 12px; width: 14px; text-align: center; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
      .search-input { width: 180px; }
      body:not(.sidebar-collapsed) main { margin-left: var(--sidebar-w); }
    }
    @media (max-width: 600px) {
      main { padding: 12px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
